name: Auto Trade

on:
  schedule:
    # Backup plan: VM 스케줄러 생존 감시(5분 주기)
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      run_job:
        description: Select job to run
        required: true
        type: choice
        default: daily_status
        options:
          - daily_status
          - health_check
          - trade
          - manual_order
          - account_sync
          - kiwoom_gold
          - kis_isa
          - kis_pension
          - all
          - vm_scheduler_start
          - vm_scheduler_ensure
          - vm_scheduler_status
          - vm_scheduler_stop
          - vm_once_add
          - vm_once_show
          - vm_cron_install
          - vm_cron_show
          - vm_cron_remove
          - vm_setup_deploy_key
          - vm_install_tools
      once_mode:
        description: 1회성 예약 대상 모드 (vm_once_add 전용)
        required: false
        type: choice
        default: kis_pension
        options:
          - kis_pension
          - upbit
          - health_check
          - daily_status
          - kiwoom_gold
          - kis_isa
      once_run_at_kst:
        description: 1회성 실행시각 KST (YYYY-MM-DD HH:MM[:SS], 비우면 내일 15:20)
        required: false
        default: ""
      manual_order_params:
        description: '수동주문 JSON (예: {"coin":"BTC","side":"buy","pct":50})'
        required: false
        default: ""
      once_note:
        description: 1회성 예약 메모 (선택)
        required: false
        default: ""

permissions:
  contents: write

jobs:
  # ── 업비트 BTC 자동매매 (VM SSH 경유 - 고정 IP) ──
  trade:
    if: (github.event_name == 'workflow_dispatch' && (github.event.inputs.run_job == 'trade' || github.event.inputs.run_job == 'all'))
    runs-on: ubuntu-latest
    steps:
      - name: Run Auto Trade via Cloud VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          command_timeout: 15m
          capture_stdout: true
          envs: UPBIT_ACCESS_KEY,UPBIT_SECRET_KEY,PORTFOLIO,TRADING_MODE,TELEGRAM_BOT_TOKEN,TELEGRAM_CHAT_ID,GH_TOKEN
          script: |
            cd ~/upbit
            git fetch origin --quiet 2>/dev/null && git reset --hard origin/master --quiet 2>/dev/null || true
            bash scripts/vm_run_job.sh upbit
        env:
          UPBIT_ACCESS_KEY: ${{ secrets.UPBIT_ACCESS_KEY }}
          UPBIT_SECRET_KEY: ${{ secrets.UPBIT_SECRET_KEY }}
          PORTFOLIO: ${{ secrets.PORTFOLIO }}
          GH_TOKEN: ${{ secrets.GH_TOKEN || github.token }}
          TRADING_MODE: upbit
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN || vars.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID || vars.TELEGRAM_CHAT_ID }}

  # ── 업비트 수동주문 (전략 분석 없이 즉시 매수/매도) ──
  manual_order:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_job == 'manual_order'
    runs-on: ubuntu-latest
    steps:
      - name: Run Manual Order via Cloud VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          command_timeout: 5m
          capture_stdout: true
          envs: UPBIT_ACCESS_KEY,UPBIT_SECRET_KEY,TRADING_MODE,TELEGRAM_BOT_TOKEN,TELEGRAM_CHAT_ID,GH_TOKEN,MANUAL_ORDER
          script: |
            cd ~/upbit
            git fetch origin --quiet 2>/dev/null && git reset --hard origin/master --quiet 2>/dev/null || true
            bash scripts/vm_run_job.sh manual_order
        env:
          UPBIT_ACCESS_KEY: ${{ secrets.UPBIT_ACCESS_KEY }}
          UPBIT_SECRET_KEY: ${{ secrets.UPBIT_SECRET_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN || github.token }}
          TRADING_MODE: manual_order
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN || vars.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID || vars.TELEGRAM_CHAT_ID }}
          MANUAL_ORDER: ${{ github.event.inputs.manual_order_params }}

  # ── 계좌 데이터 VM 경유 동기화 (잔고/체결/입출금) ──
  account_sync:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_job == 'account_sync'
    runs-on: ubuntu-latest
    steps:
      - name: Sync Account Data via Cloud VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          command_timeout: 5m
          capture_stdout: true
          envs: UPBIT_ACCESS_KEY,UPBIT_SECRET_KEY,TRADING_MODE,TELEGRAM_BOT_TOKEN,TELEGRAM_CHAT_ID,GH_TOKEN
          script: |
            cd ~/upbit
            git fetch origin --quiet 2>/dev/null && git reset --hard origin/master --quiet 2>/dev/null || true
            bash scripts/vm_run_job.sh account_sync
        env:
          UPBIT_ACCESS_KEY: ${{ secrets.UPBIT_ACCESS_KEY }}
          UPBIT_SECRET_KEY: ${{ secrets.UPBIT_SECRET_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN || github.token }}
          TRADING_MODE: account_sync
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN || vars.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID || vars.TELEGRAM_CHAT_ID }}

  # ── 키움 금현물 자동매매 ─────────────────────────────────
  kiwoom_gold:
    if: github.event_name == 'workflow_dispatch' && (github.event.inputs.run_job == 'kiwoom_gold' || github.event.inputs.run_job == 'all')
    runs-on: ubuntu-latest
    steps:
      - name: Run Auto Trade (Kiwoom Gold) via Cloud VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          command_timeout: 15m
          envs: KIWOOM_APP_KEY,KIWOOM_SECRET_KEY,KIWOOM_ACCOUNT,GOLD_PORTFOLIO,GOLD_BUY_PERIOD,GOLD_SELL_PERIOD,TRADING_MODE,TELEGRAM_BOT_TOKEN,TELEGRAM_CHAT_ID
          script: |
            cd ~/upbit
            git fetch origin --quiet 2>/dev/null && git reset --hard origin/master --quiet 2>/dev/null || true
            bash scripts/vm_run_job.sh kiwoom_gold
        env:
          KIWOOM_APP_KEY: ${{ secrets.KIWOOM_APP_KEY }}
          KIWOOM_SECRET_KEY: ${{ secrets.KIWOOM_SECRET_KEY }}
          KIWOOM_ACCOUNT: ${{ secrets.KIWOOM_ACCOUNT }}
          GOLD_PORTFOLIO: ${{ secrets.GOLD_PORTFOLIO }}
          GOLD_BUY_PERIOD: '90'
          GOLD_SELL_PERIOD: '55'
          TRADING_MODE: kiwoom_gold
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN || vars.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID || vars.TELEGRAM_CHAT_ID }}

  kis_isa:
    if: github.event_name == 'workflow_dispatch' && (github.event.inputs.run_job == 'kis_isa' || github.event.inputs.run_job == 'all')
    runs-on: ubuntu-latest
    steps:
      - name: Run Auto Trade (KIS ISA - WDR) via Cloud VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          command_timeout: 15m
          envs: KIS_ISA_APP_KEY,KIS_ISA_APP_SECRET,KIS_ISA_ACCOUNT_NO,KIS_ISA_ETF_CODE,TRADING_MODE,TELEGRAM_BOT_TOKEN,TELEGRAM_CHAT_ID
          script: |
            cd ~/upbit
            git fetch origin --quiet 2>/dev/null && git reset --hard origin/master --quiet 2>/dev/null || true
            bash scripts/vm_run_job.sh kis_isa
        env:
          KIS_ISA_APP_KEY: ${{ secrets.KIS_ISA_APP_KEY }}
          KIS_ISA_APP_SECRET: ${{ secrets.KIS_ISA_APP_SECRET }}
          KIS_ISA_ACCOUNT_NO: ${{ secrets.KIS_ISA_ACCOUNT_NO }}
          KIS_ISA_ETF_CODE: ${{ secrets.KIS_ISA_ETF_CODE }}
          TRADING_MODE: kis_isa
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN || vars.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID || vars.TELEGRAM_CHAT_ID }}

  kis_pension:
    if: github.event_name == 'workflow_dispatch' && (github.event.inputs.run_job == 'kis_pension' || github.event.inputs.run_job == 'all')
    runs-on: ubuntu-latest
    steps:
      - name: Run Auto Trade (KIS Pension - LAA) via Cloud VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          command_timeout: 90m
          envs: KIS_APP_KEY,KIS_APP_SECRET,KIS_PENSION_ACCOUNT_NO,TRADING_MODE,TELEGRAM_BOT_TOKEN,TELEGRAM_CHAT_ID
          script: |
            cd ~/upbit
            git fetch origin --quiet 2>/dev/null && git reset --hard origin/master --quiet 2>/dev/null || true
            bash scripts/vm_run_job.sh kis_pension
        env:
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
          KIS_PENSION_ACCOUNT_NO: ${{ secrets.KIS_PENSION_ACCOUNT_NO }}
          TRADING_MODE: kis_pension
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN || vars.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID || vars.TELEGRAM_CHAT_ID }}

  vm_cron_install:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_job == 'vm_cron_install'
    runs-on: ubuntu-latest
    steps:
      - name: Install VM Cron Schedule
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          command_timeout: 15m
          script: |
            cd ~/upbit
            git fetch origin --quiet 2>/dev/null && git reset --hard origin/master --quiet 2>/dev/null || true
            bash scripts/vm_cron_manager.sh install

  vm_cron_show:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_job == 'vm_cron_show'
    runs-on: ubuntu-latest
    steps:
      - name: Show VM Cron Schedule
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          command_timeout: 5m
          script: |
            cd ~/upbit
            bash scripts/vm_cron_manager.sh show

  vm_cron_remove:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_job == 'vm_cron_remove'
    runs-on: ubuntu-latest
    steps:
      - name: Remove VM Cron Schedule
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          command_timeout: 5m
          script: |
            cd ~/upbit
            bash scripts/vm_cron_manager.sh remove

  vm_scheduler_start:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_job == 'vm_scheduler_start'
    runs-on: ubuntu-latest
    steps:
      - name: Start Python Scheduler on VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          command_timeout: 5m
          envs: UPBIT_ACCESS_KEY,UPBIT_SECRET_KEY,PORTFOLIO,KIWOOM_APP_KEY,KIWOOM_SECRET_KEY,KIWOOM_ACCOUNT,GOLD_PORTFOLIO,GOLD_BUY_PERIOD,GOLD_SELL_PERIOD,KIS_ISA_APP_KEY,KIS_ISA_APP_SECRET,KIS_ISA_ACCOUNT_NO,KIS_ISA_ETF_CODE,KIS_APP_KEY,KIS_APP_SECRET,KIS_PENSION_ACCOUNT_NO,TELEGRAM_BOT_TOKEN,TELEGRAM_CHAT_ID,GH_TOKEN,HEALTHCHECK_UPBIT_RECOVERY
          script: |
            cd ~/upbit
            git fetch origin --quiet 2>/dev/null && git reset --hard origin/master --quiet 2>/dev/null || true
            {
              printf "UPBIT_ACCESS_KEY=%q\n" "${UPBIT_ACCESS_KEY}"
              printf "UPBIT_SECRET_KEY=%q\n" "${UPBIT_SECRET_KEY}"
              printf "PORTFOLIO=%q\n" "${PORTFOLIO}"
              printf "KIWOOM_APP_KEY=%q\n" "${KIWOOM_APP_KEY}"
              printf "KIWOOM_SECRET_KEY=%q\n" "${KIWOOM_SECRET_KEY}"
              printf "KIWOOM_ACCOUNT=%q\n" "${KIWOOM_ACCOUNT}"
              printf "GOLD_PORTFOLIO=%q\n" "${GOLD_PORTFOLIO}"
              printf "GOLD_BUY_PERIOD=%q\n" "${GOLD_BUY_PERIOD}"
              printf "GOLD_SELL_PERIOD=%q\n" "${GOLD_SELL_PERIOD}"
              printf "KIS_ISA_APP_KEY=%q\n" "${KIS_ISA_APP_KEY}"
              printf "KIS_ISA_APP_SECRET=%q\n" "${KIS_ISA_APP_SECRET}"
              printf "KIS_ISA_ACCOUNT_NO=%q\n" "${KIS_ISA_ACCOUNT_NO}"
              printf "KIS_ISA_ETF_CODE=%q\n" "${KIS_ISA_ETF_CODE}"
              printf "KIS_APP_KEY=%q\n" "${KIS_APP_KEY}"
              printf "KIS_APP_SECRET=%q\n" "${KIS_APP_SECRET}"
              printf "KIS_PENSION_ACCOUNT_NO=%q\n" "${KIS_PENSION_ACCOUNT_NO}"
              printf "TELEGRAM_BOT_TOKEN=%q\n" "${TELEGRAM_BOT_TOKEN}"
              printf "TELEGRAM_CHAT_ID=%q\n" "${TELEGRAM_CHAT_ID}"
              printf "GH_TOKEN=%q\n" "${GH_TOKEN}"
              printf "HEALTHCHECK_UPBIT_RECOVERY=%q\n" "${HEALTHCHECK_UPBIT_RECOVERY}"
            } > .vm_runtime_env
            chmod 600 .vm_runtime_env
            bash scripts/vm_scheduler_manager.sh start
        env:
          # 업비트
          UPBIT_ACCESS_KEY: ${{ secrets.UPBIT_ACCESS_KEY }}
          UPBIT_SECRET_KEY: ${{ secrets.UPBIT_SECRET_KEY }}
          PORTFOLIO: ${{ secrets.PORTFOLIO }}
          # 키움 금현물
          KIWOOM_APP_KEY: ${{ secrets.KIWOOM_APP_KEY }}
          KIWOOM_SECRET_KEY: ${{ secrets.KIWOOM_SECRET_KEY }}
          KIWOOM_ACCOUNT: ${{ secrets.KIWOOM_ACCOUNT }}
          GOLD_PORTFOLIO: ${{ secrets.GOLD_PORTFOLIO }}
          GOLD_BUY_PERIOD: '90'
          GOLD_SELL_PERIOD: '55'
          # KIS ISA
          KIS_ISA_APP_KEY: ${{ secrets.KIS_ISA_APP_KEY }}
          KIS_ISA_APP_SECRET: ${{ secrets.KIS_ISA_APP_SECRET }}
          KIS_ISA_ACCOUNT_NO: ${{ secrets.KIS_ISA_ACCOUNT_NO }}
          KIS_ISA_ETF_CODE: ${{ secrets.KIS_ISA_ETF_CODE }}
          # KIS 연금저축
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
          KIS_PENSION_ACCOUNT_NO: ${{ secrets.KIS_PENSION_ACCOUNT_NO }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN || vars.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID || vars.TELEGRAM_CHAT_ID }}
          GH_TOKEN: ${{ secrets.GH_TOKEN || github.token }}
          HEALTHCHECK_UPBIT_RECOVERY: '1'

  vm_scheduler_ensure:
    if: (github.event_name == 'workflow_dispatch' && github.event.inputs.run_job == 'vm_scheduler_ensure') || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Ensure Python Scheduler on VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          command_timeout: 5m
          envs: UPBIT_ACCESS_KEY,UPBIT_SECRET_KEY,PORTFOLIO,KIWOOM_APP_KEY,KIWOOM_SECRET_KEY,KIWOOM_ACCOUNT,GOLD_PORTFOLIO,GOLD_BUY_PERIOD,GOLD_SELL_PERIOD,KIS_ISA_APP_KEY,KIS_ISA_APP_SECRET,KIS_ISA_ACCOUNT_NO,KIS_ISA_ETF_CODE,KIS_APP_KEY,KIS_APP_SECRET,KIS_PENSION_ACCOUNT_NO,TELEGRAM_BOT_TOKEN,TELEGRAM_CHAT_ID,GH_TOKEN,HEALTHCHECK_UPBIT_RECOVERY
          script: |
            cd ~/upbit
            git fetch origin --quiet 2>/dev/null && git reset --hard origin/master --quiet 2>/dev/null || true
            {
              printf "UPBIT_ACCESS_KEY=%q\n" "${UPBIT_ACCESS_KEY}"
              printf "UPBIT_SECRET_KEY=%q\n" "${UPBIT_SECRET_KEY}"
              printf "PORTFOLIO=%q\n" "${PORTFOLIO}"
              printf "KIWOOM_APP_KEY=%q\n" "${KIWOOM_APP_KEY}"
              printf "KIWOOM_SECRET_KEY=%q\n" "${KIWOOM_SECRET_KEY}"
              printf "KIWOOM_ACCOUNT=%q\n" "${KIWOOM_ACCOUNT}"
              printf "GOLD_PORTFOLIO=%q\n" "${GOLD_PORTFOLIO}"
              printf "GOLD_BUY_PERIOD=%q\n" "${GOLD_BUY_PERIOD}"
              printf "GOLD_SELL_PERIOD=%q\n" "${GOLD_SELL_PERIOD}"
              printf "KIS_ISA_APP_KEY=%q\n" "${KIS_ISA_APP_KEY}"
              printf "KIS_ISA_APP_SECRET=%q\n" "${KIS_ISA_APP_SECRET}"
              printf "KIS_ISA_ACCOUNT_NO=%q\n" "${KIS_ISA_ACCOUNT_NO}"
              printf "KIS_ISA_ETF_CODE=%q\n" "${KIS_ISA_ETF_CODE}"
              printf "KIS_APP_KEY=%q\n" "${KIS_APP_KEY}"
              printf "KIS_APP_SECRET=%q\n" "${KIS_APP_SECRET}"
              printf "KIS_PENSION_ACCOUNT_NO=%q\n" "${KIS_PENSION_ACCOUNT_NO}"
              printf "TELEGRAM_BOT_TOKEN=%q\n" "${TELEGRAM_BOT_TOKEN}"
              printf "TELEGRAM_CHAT_ID=%q\n" "${TELEGRAM_CHAT_ID}"
              printf "GH_TOKEN=%q\n" "${GH_TOKEN}"
              printf "HEALTHCHECK_UPBIT_RECOVERY=%q\n" "${HEALTHCHECK_UPBIT_RECOVERY}"
            } > .vm_runtime_env
            chmod 600 .vm_runtime_env
            bash scripts/vm_scheduler_manager.sh ensure
        env:
          # 업비트
          UPBIT_ACCESS_KEY: ${{ secrets.UPBIT_ACCESS_KEY }}
          UPBIT_SECRET_KEY: ${{ secrets.UPBIT_SECRET_KEY }}
          PORTFOLIO: ${{ secrets.PORTFOLIO }}
          # 키움 금현물
          KIWOOM_APP_KEY: ${{ secrets.KIWOOM_APP_KEY }}
          KIWOOM_SECRET_KEY: ${{ secrets.KIWOOM_SECRET_KEY }}
          KIWOOM_ACCOUNT: ${{ secrets.KIWOOM_ACCOUNT }}
          GOLD_PORTFOLIO: ${{ secrets.GOLD_PORTFOLIO }}
          GOLD_BUY_PERIOD: '90'
          GOLD_SELL_PERIOD: '55'
          # KIS ISA
          KIS_ISA_APP_KEY: ${{ secrets.KIS_ISA_APP_KEY }}
          KIS_ISA_APP_SECRET: ${{ secrets.KIS_ISA_APP_SECRET }}
          KIS_ISA_ACCOUNT_NO: ${{ secrets.KIS_ISA_ACCOUNT_NO }}
          KIS_ISA_ETF_CODE: ${{ secrets.KIS_ISA_ETF_CODE }}
          # KIS 연금저축
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
          KIS_PENSION_ACCOUNT_NO: ${{ secrets.KIS_PENSION_ACCOUNT_NO }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN || vars.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID || vars.TELEGRAM_CHAT_ID }}
          GH_TOKEN: ${{ secrets.GH_TOKEN || github.token }}
          HEALTHCHECK_UPBIT_RECOVERY: '1'

  vm_scheduler_status:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_job == 'vm_scheduler_status'
    runs-on: ubuntu-latest
    steps:
      - name: Show Python Scheduler Status on VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          command_timeout: 5m
          script: |
            cd ~/upbit
            bash scripts/vm_scheduler_manager.sh status

  vm_scheduler_stop:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_job == 'vm_scheduler_stop'
    runs-on: ubuntu-latest
    steps:
      - name: Stop Python Scheduler on VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          command_timeout: 5m
          script: |
            cd ~/upbit
            bash scripts/vm_scheduler_manager.sh stop

  vm_once_add:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_job == 'vm_once_add'
    runs-on: ubuntu-latest
    steps:
      - name: Add One-off Schedule on VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          command_timeout: 5m
          envs: ONCE_MODE,ONCE_RUN_AT_KST,ONCE_NOTE
          script: |
            cd ~/upbit
            git fetch origin --quiet 2>/dev/null && git reset --hard origin/master --quiet 2>/dev/null || true
            bash scripts/vm_scheduler_manager.sh ensure
            if [ -z "${ONCE_RUN_AT_KST}" ]; then
              ONCE_RUN_AT_KST="$(TZ=Asia/Seoul date -d 'tomorrow 15:20' '+%Y-%m-%d %H:%M')"
            fi
            echo "[info] 예약주문 등록: mode=${ONCE_MODE} run_at_kst=${ONCE_RUN_AT_KST} file=logs/vm_reserved_orders.json"
            bash scripts/vm_oneoff_manager.sh add "${ONCE_MODE}" "${ONCE_RUN_AT_KST}" "${ONCE_NOTE}"
        env:
          ONCE_MODE: ${{ github.event.inputs.once_mode }}
          ONCE_RUN_AT_KST: ${{ github.event.inputs.once_run_at_kst }}
          ONCE_NOTE: ${{ github.event.inputs.once_note }}

  vm_once_show:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_job == 'vm_once_show'
    runs-on: ubuntu-latest
    steps:
      - name: Show One-off Schedule on VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          command_timeout: 5m
          script: |
            cd ~/upbit
            bash scripts/vm_oneoff_manager.sh show
            bash scripts/vm_scheduler_manager.sh status

  health_check:
    if: (github.event_name == 'workflow_dispatch' && (github.event.inputs.run_job == 'health_check' || github.event.inputs.run_job == 'all'))
    runs-on: ubuntu-latest
    steps:
      - name: Run Daily Health Check via Cloud VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          command_timeout: 15m
          capture_stdout: true
          envs: UPBIT_ACCESS_KEY,UPBIT_SECRET_KEY,PORTFOLIO,KIWOOM_APP_KEY,KIWOOM_SECRET_KEY,KIWOOM_ACCOUNT,GOLD_PORTFOLIO,GOLD_BUY_PERIOD,GOLD_SELL_PERIOD,KIS_ISA_APP_KEY,KIS_ISA_APP_SECRET,KIS_ISA_ACCOUNT_NO,KIS_ISA_ETF_CODE,KIS_APP_KEY,KIS_APP_SECRET,KIS_PENSION_ACCOUNT_NO,TRADING_MODE,TELEGRAM_BOT_TOKEN,TELEGRAM_CHAT_ID,GH_TOKEN,HEALTHCHECK_UPBIT_RECOVERY
          script: |
            cd ~/upbit
            git fetch origin --quiet 2>/dev/null && git reset --hard origin/master --quiet 2>/dev/null || true
            bash scripts/vm_run_job.sh health_check
        env:
          # 업비트
          UPBIT_ACCESS_KEY: ${{ secrets.UPBIT_ACCESS_KEY }}
          UPBIT_SECRET_KEY: ${{ secrets.UPBIT_SECRET_KEY }}
          PORTFOLIO: ${{ secrets.PORTFOLIO }}
          GH_TOKEN: ${{ secrets.GH_TOKEN || github.token }}
          # 키움 금현물
          KIWOOM_APP_KEY: ${{ secrets.KIWOOM_APP_KEY }}
          KIWOOM_SECRET_KEY: ${{ secrets.KIWOOM_SECRET_KEY }}
          KIWOOM_ACCOUNT: ${{ secrets.KIWOOM_ACCOUNT }}
          GOLD_PORTFOLIO: ${{ secrets.GOLD_PORTFOLIO }}
          GOLD_BUY_PERIOD: '90'
          GOLD_SELL_PERIOD: '55'
          # KIS ISA
          KIS_ISA_APP_KEY: ${{ secrets.KIS_ISA_APP_KEY }}
          KIS_ISA_APP_SECRET: ${{ secrets.KIS_ISA_APP_SECRET }}
          KIS_ISA_ACCOUNT_NO: ${{ secrets.KIS_ISA_ACCOUNT_NO }}
          KIS_ISA_ETF_CODE: ${{ secrets.KIS_ISA_ETF_CODE }}
          # KIS 연금저축
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
          KIS_PENSION_ACCOUNT_NO: ${{ secrets.KIS_PENSION_ACCOUNT_NO }}
          TRADING_MODE: health_check
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN || vars.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID || vars.TELEGRAM_CHAT_ID }}
          HEALTHCHECK_UPBIT_RECOVERY: '1'

  # ── 일일 자산 현황 리포트 (VM SSH 경유) ──────────
  daily_status:
    if: (github.event_name == 'workflow_dispatch' && (github.event.inputs.run_job == 'daily_status' || github.event.inputs.run_job == 'all'))
    runs-on: ubuntu-latest
    steps:
      - name: Run Daily Status Report via Cloud VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          command_timeout: 15m
          envs: UPBIT_ACCESS_KEY,UPBIT_SECRET_KEY,PORTFOLIO,KIWOOM_APP_KEY,KIWOOM_SECRET_KEY,KIWOOM_ACCOUNT,KIS_ISA_APP_KEY,KIS_ISA_APP_SECRET,KIS_ISA_ACCOUNT_NO,KIS_ISA_ETF_CODE,KIS_APP_KEY,KIS_APP_SECRET,KIS_PENSION_ACCOUNT_NO,TRADING_MODE,TELEGRAM_BOT_TOKEN,TELEGRAM_CHAT_ID,GH_TOKEN
          script: |
            cd ~/upbit
            git fetch origin --quiet 2>/dev/null && git reset --hard origin/master --quiet 2>/dev/null || true
            bash scripts/vm_run_job.sh daily_status
        env:
          # Upbit
          UPBIT_ACCESS_KEY: ${{ secrets.UPBIT_ACCESS_KEY }}
          UPBIT_SECRET_KEY: ${{ secrets.UPBIT_SECRET_KEY }}
          PORTFOLIO: ${{ secrets.PORTFOLIO }}
          GH_TOKEN: ${{ secrets.GH_TOKEN || github.token }}
          # Kiwoom Gold
          KIWOOM_APP_KEY: ${{ secrets.KIWOOM_APP_KEY }}
          KIWOOM_SECRET_KEY: ${{ secrets.KIWOOM_SECRET_KEY }}
          KIWOOM_ACCOUNT: ${{ secrets.KIWOOM_ACCOUNT }}
          # KIS ISA
          KIS_ISA_APP_KEY: ${{ secrets.KIS_ISA_APP_KEY }}
          KIS_ISA_APP_SECRET: ${{ secrets.KIS_ISA_APP_SECRET }}
          KIS_ISA_ACCOUNT_NO: ${{ secrets.KIS_ISA_ACCOUNT_NO }}
          KIS_ISA_ETF_CODE: ${{ secrets.KIS_ISA_ETF_CODE }}
          # KIS Pension
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
          KIS_PENSION_ACCOUNT_NO: ${{ secrets.KIS_PENSION_ACCOUNT_NO }}
          TRADING_MODE: daily_status
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN || vars.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID || vars.TELEGRAM_CHAT_ID }}

  # ── VM Deploy Key 생성 (1회성 - GitHub SSH 인증 영구화) ──
  vm_setup_deploy_key:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_job == 'vm_setup_deploy_key'
    runs-on: ubuntu-latest
    steps:
      - name: Generate Deploy Key on VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          command_timeout: 2m
          script: |
            KEY_FILE="$HOME/.ssh/id_ed25519_github"
            if [ -f "$KEY_FILE" ]; then
              echo "=== 기존 Deploy Key 존재 ==="
            else
              ssh-keygen -t ed25519 -C "vm-auto-trade-deploy-key" -f "$KEY_FILE" -N ""
              echo "=== Deploy Key 생성 완료 ==="
            fi
            echo ""
            echo "=== PUBLIC KEY (아래 내용을 GitHub Deploy Keys에 등록) ==="
            cat "${KEY_FILE}.pub"
            echo ""
            echo "=== SSH config 설정 ==="
            if ! grep -q "id_ed25519_github" "$HOME/.ssh/config" 2>/dev/null; then
              cat >> "$HOME/.ssh/config" << 'SSHCONF'

            Host github.com
              HostName github.com
              User git
              IdentityFile ~/.ssh/id_ed25519_github
              IdentitiesOnly yes
            SSHCONF
              chmod 600 "$HOME/.ssh/config"
              echo "SSH config 추가 완료"
            else
              echo "SSH config 이미 설정됨"
            fi
            echo ""
            echo "=== git remote 설정 ==="
            cd ~/upbit 2>/dev/null || true
            CURRENT_REMOTE=$(git remote get-url origin 2>/dev/null || echo "없음")
            echo "현재 remote: $CURRENT_REMOTE"
            if echo "$CURRENT_REMOTE" | grep -q "https://"; then
              git remote set-url origin git@github.com:doukui7/UPbit.git
              echo "remote → SSH 변경 완료: git@github.com:doukui7/UPbit.git"
            else
              echo "이미 SSH remote 사용 중"
            fi

  # ── VM 운영 도구 설치 (PM2 + Glances) ──
  vm_install_tools:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_job == 'vm_install_tools'
    runs-on: ubuntu-latest
    steps:
      - name: Install PM2 and Glances on VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          command_timeout: 10m
          script: |
            echo "=== Node.js / PM2 설치 ==="
            if command -v node &>/dev/null; then
              echo "Node.js 이미 설치됨: $(node -v)"
            else
              echo "Node.js 설치 중..."
              curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash - 2>/dev/null
              sudo apt-get install -y nodejs 2>/dev/null || {
                echo "apt 설치 실패, nvm fallback..."
                curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.39.7/install.sh | bash
                export NVM_DIR="$HOME/.nvm"
                [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
                nvm install 20
              }
              echo "Node.js 설치 완료: $(node -v 2>/dev/null || echo 'nvm 재로그인 필요')"
            fi

            if command -v pm2 &>/dev/null; then
              echo "PM2 이미 설치됨: $(pm2 -v)"
            else
              echo "PM2 설치 중..."
              sudo npm install -g pm2 2>/dev/null || npm install -g pm2
              echo "PM2 설치 완료: $(pm2 -v 2>/dev/null || echo '확인 필요')"
            fi

            echo ""
            echo "=== Glances 설치 ==="
            if command -v glances &>/dev/null; then
              echo "Glances 이미 설치됨: $(glances -V 2>/dev/null | head -1)"
            else
              echo "Glances 설치 중..."
              pip3 install glances[all] 2>/dev/null || pip install glances[all] 2>/dev/null || {
                echo "pip 설치 실패, pipx fallback..."
                pipx install "glances[all]" 2>/dev/null || sudo pip3 install glances 2>/dev/null
              }
              echo "Glances 설치 완료: $(glances -V 2>/dev/null | head -1 || echo '확인 필요')"
            fi

            echo ""
            echo "=== 설치 결과 요약 ==="
            echo "Node.js: $(node -v 2>/dev/null || echo '미설치')"
            echo "npm: $(npm -v 2>/dev/null || echo '미설치')"
            echo "PM2: $(pm2 -v 2>/dev/null || echo '미설치')"
            echo "Glances: $(glances -V 2>/dev/null | head -1 || echo '미설치')"

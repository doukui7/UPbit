name: "Pension Trade"

on:
  schedule:
    # 매 평일 KST 15:45 (UTC 06:45) — 대기주문 있으면 실행 (VM 스케줄러 백업)
    - cron: "45 6 * * 1-5"
  workflow_dispatch:
    inputs:
      run_job:
        description: Select job to run
        required: true
        type: choice
        default: kis_pension
        options:
          - kis_pension

permissions:
  contents: write

jobs:
  # ── KIS 연금저축 예약주문 실행 ──
  kis_pension:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Run Pension Orders via Cloud VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          command_timeout: 30m
          envs: KIS_APP_KEY,KIS_APP_SECRET,KIS_PENSION_ACCOUNT_NO,TRADING_MODE,TELEGRAM_BOT_TOKEN,TELEGRAM_CHAT_ID
          script: |
            cd ~/upbit
            git remote set-url origin https://github.com/doukui7/UPbit.git 2>/dev/null || true
            git fetch origin --quiet 2>/dev/null && git reset --hard origin/master --quiet 2>/dev/null || true
            bash scripts/vm_run_job.sh kis_pension
        env:
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
          KIS_PENSION_ACCOUNT_NO: ${{ secrets.KIS_PENSION_ACCOUNT_NO }}
          TRADING_MODE: kis_pension
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN || vars.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID || vars.TELEGRAM_CHAT_ID }}

      - name: Sync pension orders from VM and push
        env:
          VM_SSH_KEY: ${{ secrets.VM_SSH_KEY }}
          VM_HOST: ${{ secrets.VM_HOST }}
          VM_USER: ${{ secrets.VM_USER }}
        run: |
          mkdir -p ~/.ssh
          echo "${VM_SSH_KEY}" > ~/.ssh/vm_key
          chmod 600 ~/.ssh/vm_key
          ssh-keyscan -H "${VM_HOST}" >> ~/.ssh/known_hosts 2>/dev/null
          mkdir -p config
          scp -i ~/.ssh/vm_key "${VM_USER}@${VM_HOST}:~/upbit/config/pension_orders.json" ./config/pension_orders.json || echo "WARN: pension_orders.json not found"
          rm -f ~/.ssh/vm_key
          git config user.name "auto-trade-bot"
          git config user.email "bot@auto-trade"
          git add config/pension_orders.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "auto: 연금저축 예약주문 실행 결과 동기화"
            git push
          fi

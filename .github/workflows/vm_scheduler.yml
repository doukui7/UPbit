name: "VM Scheduler"

on:
  schedule:
    # VM 스케줄러 생존 감시 + 코드 업데이트 (15분 주기)
    # 잔고 push는 VM 직접 처리 (GH_PAT), ensure는 보조 역할
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      run_job:
        description: Select job to run
        required: true
        type: choice
        default: vm_scheduler_ensure
        options:
          - vm_scheduler_start
          - vm_scheduler_ensure
          - vm_scheduler_status
          - vm_scheduler_stop
          - balance_sync

permissions:
  contents: write

jobs:
  vm_scheduler_start:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_job == 'vm_scheduler_start'
    runs-on: ubuntu-latest
    steps:
      - name: Start Python Scheduler on VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          command_timeout: 5m
          envs: UPBIT_ACCESS_KEY,UPBIT_SECRET_KEY,PORTFOLIO,KIWOOM_APP_KEY,KIWOOM_SECRET_KEY,KIWOOM_ACCOUNT,GOLD_PORTFOLIO,GOLD_BUY_PERIOD,GOLD_SELL_PERIOD,KIS_ISA_APP_KEY,KIS_ISA_APP_SECRET,KIS_ISA_ACCOUNT_NO,KIS_ISA_ETF_CODE,KIS_APP_KEY,KIS_APP_SECRET,KIS_PENSION_ACCOUNT_NO,TELEGRAM_BOT_TOKEN,TELEGRAM_CHAT_ID,HEALTHCHECK_UPBIT_RECOVERY,GH_PAT
          script: |
            cd ~/upbit
            git remote set-url origin https://github.com/doukui7/UPbit.git 2>/dev/null || true
            git fetch origin --quiet 2>/dev/null && git reset --hard origin/master --quiet 2>/dev/null || true
            {
              printf "UPBIT_ACCESS_KEY=%q\n" "${UPBIT_ACCESS_KEY}"
              printf "UPBIT_SECRET_KEY=%q\n" "${UPBIT_SECRET_KEY}"
              printf "PORTFOLIO=%q\n" "${PORTFOLIO}"
              printf "KIWOOM_APP_KEY=%q\n" "${KIWOOM_APP_KEY}"
              printf "KIWOOM_SECRET_KEY=%q\n" "${KIWOOM_SECRET_KEY}"
              printf "KIWOOM_ACCOUNT=%q\n" "${KIWOOM_ACCOUNT}"
              printf "GOLD_PORTFOLIO=%q\n" "${GOLD_PORTFOLIO}"
              printf "GOLD_BUY_PERIOD=%q\n" "${GOLD_BUY_PERIOD}"
              printf "GOLD_SELL_PERIOD=%q\n" "${GOLD_SELL_PERIOD}"
              printf "KIS_ISA_APP_KEY=%q\n" "${KIS_ISA_APP_KEY}"
              printf "KIS_ISA_APP_SECRET=%q\n" "${KIS_ISA_APP_SECRET}"
              printf "KIS_ISA_ACCOUNT_NO=%q\n" "${KIS_ISA_ACCOUNT_NO}"
              printf "KIS_ISA_ETF_CODE=%q\n" "${KIS_ISA_ETF_CODE}"
              printf "KIS_APP_KEY=%q\n" "${KIS_APP_KEY}"
              printf "KIS_APP_SECRET=%q\n" "${KIS_APP_SECRET}"
              printf "KIS_PENSION_ACCOUNT_NO=%q\n" "${KIS_PENSION_ACCOUNT_NO}"
              printf "TELEGRAM_BOT_TOKEN=%q\n" "${TELEGRAM_BOT_TOKEN}"
              printf "TELEGRAM_CHAT_ID=%q\n" "${TELEGRAM_CHAT_ID}"
              printf "HEALTHCHECK_UPBIT_RECOVERY=%q\n" "${HEALTHCHECK_UPBIT_RECOVERY}"
              printf "GH_PAT=%q\n" "${GH_PAT}"
            } > .vm_runtime_env
            chmod 600 .vm_runtime_env
            bash scripts/vm_scheduler_manager.sh start
        env:
          # 업비트
          UPBIT_ACCESS_KEY: ${{ secrets.UPBIT_ACCESS_KEY }}
          UPBIT_SECRET_KEY: ${{ secrets.UPBIT_SECRET_KEY }}
          PORTFOLIO: ${{ secrets.PORTFOLIO }}
          # 키움 금현물
          KIWOOM_APP_KEY: ${{ secrets.KIWOOM_APP_KEY }}
          KIWOOM_SECRET_KEY: ${{ secrets.KIWOOM_SECRET_KEY }}
          KIWOOM_ACCOUNT: ${{ secrets.KIWOOM_ACCOUNT }}
          GOLD_PORTFOLIO: ${{ secrets.GOLD_PORTFOLIO }}
          GOLD_BUY_PERIOD: '90'
          GOLD_SELL_PERIOD: '55'
          # KIS ISA
          KIS_ISA_APP_KEY: ${{ secrets.KIS_ISA_APP_KEY }}
          KIS_ISA_APP_SECRET: ${{ secrets.KIS_ISA_APP_SECRET }}
          KIS_ISA_ACCOUNT_NO: ${{ secrets.KIS_ISA_ACCOUNT_NO }}
          KIS_ISA_ETF_CODE: ${{ secrets.KIS_ISA_ETF_CODE }}
          # KIS 연금저축
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
          KIS_PENSION_ACCOUNT_NO: ${{ secrets.KIS_PENSION_ACCOUNT_NO }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN || vars.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID || vars.TELEGRAM_CHAT_ID }}
          HEALTHCHECK_UPBIT_RECOVERY: '1'
          GH_PAT: ${{ secrets.GH_PAT }}

  vm_scheduler_ensure:
    if: (github.event_name == 'workflow_dispatch' && github.event.inputs.run_job == 'vm_scheduler_ensure') || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Ensure Python Scheduler on VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          command_timeout: 5m
          envs: UPBIT_ACCESS_KEY,UPBIT_SECRET_KEY,PORTFOLIO,KIWOOM_APP_KEY,KIWOOM_SECRET_KEY,KIWOOM_ACCOUNT,GOLD_PORTFOLIO,GOLD_BUY_PERIOD,GOLD_SELL_PERIOD,KIS_ISA_APP_KEY,KIS_ISA_APP_SECRET,KIS_ISA_ACCOUNT_NO,KIS_ISA_ETF_CODE,KIS_APP_KEY,KIS_APP_SECRET,KIS_PENSION_ACCOUNT_NO,TELEGRAM_BOT_TOKEN,TELEGRAM_CHAT_ID,HEALTHCHECK_UPBIT_RECOVERY,GH_PAT
          script: |
            cd ~/upbit
            git remote set-url origin https://github.com/doukui7/UPbit.git 2>/dev/null || true
            # 상태 파일 백업 (git reset 덮어쓰기 방지)
            cp balance_cache.json /tmp/_bc_backup.json 2>/dev/null || true
            cp signal_state.json /tmp/_ss_backup.json 2>/dev/null || true
            cp trade_log.json /tmp/_tl_backup.json 2>/dev/null || true
            cp logs/vm_scheduler_state.json /tmp/_sched_backup.json 2>/dev/null || true
            git fetch origin --quiet 2>/dev/null && git reset --hard origin/master --quiet 2>/dev/null || true
            cp /tmp/_bc_backup.json balance_cache.json 2>/dev/null || true
            cp /tmp/_ss_backup.json signal_state.json 2>/dev/null || true
            cp /tmp/_tl_backup.json trade_log.json 2>/dev/null || true
            cp /tmp/_sched_backup.json logs/vm_scheduler_state.json 2>/dev/null || true
            {
              printf "UPBIT_ACCESS_KEY=%q\n" "${UPBIT_ACCESS_KEY}"
              printf "UPBIT_SECRET_KEY=%q\n" "${UPBIT_SECRET_KEY}"
              printf "PORTFOLIO=%q\n" "${PORTFOLIO}"
              printf "KIWOOM_APP_KEY=%q\n" "${KIWOOM_APP_KEY}"
              printf "KIWOOM_SECRET_KEY=%q\n" "${KIWOOM_SECRET_KEY}"
              printf "KIWOOM_ACCOUNT=%q\n" "${KIWOOM_ACCOUNT}"
              printf "GOLD_PORTFOLIO=%q\n" "${GOLD_PORTFOLIO}"
              printf "GOLD_BUY_PERIOD=%q\n" "${GOLD_BUY_PERIOD}"
              printf "GOLD_SELL_PERIOD=%q\n" "${GOLD_SELL_PERIOD}"
              printf "KIS_ISA_APP_KEY=%q\n" "${KIS_ISA_APP_KEY}"
              printf "KIS_ISA_APP_SECRET=%q\n" "${KIS_ISA_APP_SECRET}"
              printf "KIS_ISA_ACCOUNT_NO=%q\n" "${KIS_ISA_ACCOUNT_NO}"
              printf "KIS_ISA_ETF_CODE=%q\n" "${KIS_ISA_ETF_CODE}"
              printf "KIS_APP_KEY=%q\n" "${KIS_APP_KEY}"
              printf "KIS_APP_SECRET=%q\n" "${KIS_APP_SECRET}"
              printf "KIS_PENSION_ACCOUNT_NO=%q\n" "${KIS_PENSION_ACCOUNT_NO}"
              printf "TELEGRAM_BOT_TOKEN=%q\n" "${TELEGRAM_BOT_TOKEN}"
              printf "TELEGRAM_CHAT_ID=%q\n" "${TELEGRAM_CHAT_ID}"
              printf "HEALTHCHECK_UPBIT_RECOVERY=%q\n" "${HEALTHCHECK_UPBIT_RECOVERY}"
              printf "GH_PAT=%q\n" "${GH_PAT}"
            } > .vm_runtime_env
            chmod 600 .vm_runtime_env
            bash scripts/vm_scheduler_manager.sh ensure
        env:
          # 업비트
          UPBIT_ACCESS_KEY: ${{ secrets.UPBIT_ACCESS_KEY }}
          UPBIT_SECRET_KEY: ${{ secrets.UPBIT_SECRET_KEY }}
          PORTFOLIO: ${{ secrets.PORTFOLIO }}
          # 키움 금현물
          KIWOOM_APP_KEY: ${{ secrets.KIWOOM_APP_KEY }}
          KIWOOM_SECRET_KEY: ${{ secrets.KIWOOM_SECRET_KEY }}
          KIWOOM_ACCOUNT: ${{ secrets.KIWOOM_ACCOUNT }}
          GOLD_PORTFOLIO: ${{ secrets.GOLD_PORTFOLIO }}
          GOLD_BUY_PERIOD: '90'
          GOLD_SELL_PERIOD: '55'
          # KIS ISA
          KIS_ISA_APP_KEY: ${{ secrets.KIS_ISA_APP_KEY }}
          KIS_ISA_APP_SECRET: ${{ secrets.KIS_ISA_APP_SECRET }}
          KIS_ISA_ACCOUNT_NO: ${{ secrets.KIS_ISA_ACCOUNT_NO }}
          KIS_ISA_ETF_CODE: ${{ secrets.KIS_ISA_ETF_CODE }}
          # KIS 연금저축
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
          KIS_PENSION_ACCOUNT_NO: ${{ secrets.KIS_PENSION_ACCOUNT_NO }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN || vars.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID || vars.TELEGRAM_CHAT_ID }}
          HEALTHCHECK_UPBIT_RECOVERY: '1'
          GH_PAT: ${{ secrets.GH_PAT }}

      - name: Sync balance cache from VM
        env:
          VM_SSH_KEY: ${{ secrets.VM_SSH_KEY }}
          VM_HOST: ${{ secrets.VM_HOST }}
          VM_USER: ${{ secrets.VM_USER }}
        run: |
          mkdir -p ~/.ssh
          echo "${VM_SSH_KEY}" > ~/.ssh/vm_key
          chmod 600 ~/.ssh/vm_key
          ssh-keyscan -H "${VM_HOST}" >> ~/.ssh/known_hosts 2>/dev/null
          scp -i ~/.ssh/vm_key "${VM_USER}@${VM_HOST}:~/upbit/balance_cache.json" ./balance_cache.json || echo "WARN: balance_cache.json not found"
          scp -i ~/.ssh/vm_key "${VM_USER}@${VM_HOST}:~/upbit/signal_state.json" ./signal_state.json || echo "WARN: signal_state.json not found"
          scp -i ~/.ssh/vm_key "${VM_USER}@${VM_HOST}:~/upbit/trade_log.json" ./trade_log.json || echo "WARN: trade_log.json not found"
          mkdir -p logs
          scp -i ~/.ssh/vm_key "${VM_USER}@${VM_HOST}:~/upbit/logs/vm_scheduler_state.json" ./logs/vm_scheduler_state.json || echo "WARN: vm_scheduler_state.json not found"
          rm -f ~/.ssh/vm_key
          git config user.name "auto-trade-bot"
          git config user.email "bot@auto-trade"
          git add balance_cache.json signal_state.json trade_log.json logs/vm_scheduler_state.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to sync"
          else
            git commit -m "auto: 잔고/시그널/거래로그/스케줄러상태 동기화"
            git pull --ff-only origin master || git pull --rebase origin master || {
              git rebase --abort 2>/dev/null || true
              git reset --hard origin/master 2>/dev/null || true
              echo "WARN: merge conflict → reset to origin"
            }
            git push || echo "WARN: push failed, will retry next run"
          fi

  vm_scheduler_status:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_job == 'vm_scheduler_status'
    runs-on: ubuntu-latest
    steps:
      - name: Show Python Scheduler Status on VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          command_timeout: 5m
          script: |
            cd ~/upbit
            bash scripts/vm_scheduler_manager.sh status

  vm_scheduler_stop:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_job == 'vm_scheduler_stop'
    runs-on: ubuntu-latest
    steps:
      - name: Stop Python Scheduler on VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          command_timeout: 5m
          script: |
            cd ~/upbit
            bash scripts/vm_scheduler_manager.sh stop

  # ── VM에서 트리거하는 경량 잔고 동기화 (SCP+push만) ──
  balance_sync:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_job == 'balance_sync'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Sync balance from VM and push
        env:
          VM_SSH_KEY: ${{ secrets.VM_SSH_KEY }}
          VM_HOST: ${{ secrets.VM_HOST }}
          VM_USER: ${{ secrets.VM_USER }}
        run: |
          mkdir -p ~/.ssh
          echo "${VM_SSH_KEY}" > ~/.ssh/vm_key
          chmod 600 ~/.ssh/vm_key
          ssh-keyscan -H "${VM_HOST}" >> ~/.ssh/known_hosts 2>/dev/null
          scp -i ~/.ssh/vm_key "${VM_USER}@${VM_HOST}:~/upbit/balance_cache.json" ./balance_cache.json || echo "WARN: balance_cache.json not found"
          scp -i ~/.ssh/vm_key "${VM_USER}@${VM_HOST}:~/upbit/signal_state.json" ./signal_state.json || echo "WARN: signal_state.json not found"
          scp -i ~/.ssh/vm_key "${VM_USER}@${VM_HOST}:~/upbit/trade_log.json" ./trade_log.json || echo "WARN: trade_log.json not found"
          mkdir -p logs
          scp -i ~/.ssh/vm_key "${VM_USER}@${VM_HOST}:~/upbit/logs/vm_scheduler_state.json" ./logs/vm_scheduler_state.json || echo "WARN: vm_scheduler_state.json not found"
          rm -f ~/.ssh/vm_key
          git config user.name "auto-trade-bot"
          git config user.email "bot@auto-trade"
          git add balance_cache.json signal_state.json trade_log.json logs/vm_scheduler_state.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to sync"
          else
            git commit -m "auto: VM 잔고/시그널/거래로그/스케줄러상태 동기화"
            git pull --ff-only origin master || git pull --rebase origin master || {
              git rebase --abort 2>/dev/null || true
              git reset --hard origin/master 2>/dev/null || true
              echo "WARN: merge conflict → reset to origin"
            }
            git push || echo "WARN: push failed"
          fi

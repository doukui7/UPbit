name: "Coin Trade"

on:
  schedule:
    # 자동매매(정각) 후 잔고 동기화 — 4시간마다 +10분 (UTC = KST-9)
    # KST 01:10/05:10/09:10/13:10/17:10/21:10
    - cron: "10 16,20,0,4,8,12 * * *"
  workflow_dispatch:
    inputs:
      run_job:
        description: Select job to run
        required: true
        type: choice
        default: trade
        options:
          - trade
          - manual_order
          - account_sync
      manual_order_params:
        description: '수동주문 JSON (예: {"coin":"BTC","side":"buy","pct":50})'
        required: false
        default: ""

permissions:
  contents: write

jobs:
  # ── 업비트 BTC 자동매매 (VM SSH 경유 - 고정 IP) ──
  trade:
    if: github.event.inputs.run_job == 'trade'
    runs-on: ubuntu-latest
    steps:
      - name: Run Auto Trade via Cloud VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          command_timeout: 15m
          capture_stdout: true
          envs: UPBIT_ACCESS_KEY,UPBIT_SECRET_KEY,PORTFOLIO,TRADING_MODE,TELEGRAM_BOT_TOKEN,TELEGRAM_CHAT_ID
          script: |
            cd ~/upbit
            git remote set-url origin https://github.com/doukui7/UPbit.git 2>/dev/null || true
            git fetch origin --quiet 2>/dev/null && git reset --hard origin/master --quiet 2>/dev/null || true
            bash scripts/vm_run_job.sh upbit
        env:
          UPBIT_ACCESS_KEY: ${{ secrets.UPBIT_ACCESS_KEY }}
          UPBIT_SECRET_KEY: ${{ secrets.UPBIT_SECRET_KEY }}
          PORTFOLIO: ${{ secrets.PORTFOLIO }}
          TRADING_MODE: upbit
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN || vars.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID || vars.TELEGRAM_CHAT_ID }}

  # ── 업비트 수동주문 (전략 분석 없이 즉시 매수/매도) ──
  manual_order:
    if: github.event.inputs.run_job == 'manual_order'
    runs-on: ubuntu-latest
    steps:
      - name: Run Manual Order via Cloud VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          command_timeout: 5m
          capture_stdout: true
          envs: UPBIT_ACCESS_KEY,UPBIT_SECRET_KEY,TRADING_MODE,TELEGRAM_BOT_TOKEN,TELEGRAM_CHAT_ID,MANUAL_ORDER
          script: |
            cd ~/upbit
            git remote set-url origin https://github.com/doukui7/UPbit.git 2>/dev/null || true
            git fetch origin --quiet 2>/dev/null && git reset --hard origin/master --quiet 2>/dev/null || true
            bash scripts/vm_run_job.sh manual_order
        env:
          UPBIT_ACCESS_KEY: ${{ secrets.UPBIT_ACCESS_KEY }}
          UPBIT_SECRET_KEY: ${{ secrets.UPBIT_SECRET_KEY }}
          TRADING_MODE: manual_order
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN || vars.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID || vars.TELEGRAM_CHAT_ID }}
          MANUAL_ORDER: ${{ github.event.inputs.manual_order_params }}

  # ── 계좌 데이터 VM 경유 동기화 (잔고/체결/입출금) ──
  account_sync:
    if: (github.event_name == 'workflow_dispatch' && github.event.inputs.run_job == 'account_sync') || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      # 1) 리포 체크아웃 (push 용)
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: master

      # 2) VM에서 account_sync 실행 (GH_TOKEN 불필요)
      - name: Run Account Sync on VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          command_timeout: 5m
          envs: UPBIT_ACCESS_KEY,UPBIT_SECRET_KEY,TRADING_MODE,TELEGRAM_BOT_TOKEN,TELEGRAM_CHAT_ID
          script: |
            cd ~/upbit
            git remote set-url origin https://github.com/doukui7/UPbit.git 2>/dev/null || true
            git fetch origin --quiet 2>/dev/null && git reset --hard origin/master --quiet 2>/dev/null || true
            bash scripts/vm_run_job.sh account_sync
        env:
          UPBIT_ACCESS_KEY: ${{ secrets.UPBIT_ACCESS_KEY }}
          UPBIT_SECRET_KEY: ${{ secrets.UPBIT_SECRET_KEY }}
          TRADING_MODE: account_sync
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN || vars.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID || vars.TELEGRAM_CHAT_ID }}

      # 3) VM에서 캐시 파일 다운로드 → Runner에서 push
      - name: Download cache from VM and push
        env:
          VM_SSH_KEY: ${{ secrets.VM_SSH_KEY }}
          VM_HOST: ${{ secrets.VM_HOST }}
          VM_USER: ${{ secrets.VM_USER }}
        run: |
          # SSH 키 설정
          mkdir -p ~/.ssh
          echo "${VM_SSH_KEY}" > ~/.ssh/vm_key
          chmod 600 ~/.ssh/vm_key
          ssh-keyscan -H "${VM_HOST}" >> ~/.ssh/known_hosts 2>/dev/null

          # VM에서 캐시 파일 다운로드
          scp -i ~/.ssh/vm_key "${VM_USER}@${VM_HOST}:~/upbit/account_cache.json" ./account_cache.json || echo "WARN: account_cache.json not found"
          scp -i ~/.ssh/vm_key "${VM_USER}@${VM_HOST}:~/upbit/balance_cache.json" ./balance_cache.json || echo "WARN: balance_cache.json not found"
          rm -f ~/.ssh/vm_key

          # 변경사항 있으면 commit & push
          git config user.name "auto-trade-bot"
          git config user.email "bot@auto-trade"
          git add account_cache.json balance_cache.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "auto: 계좌 데이터 동기화"
            git push
          fi
